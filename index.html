<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Юлия Савицкая — Интеллект-тренер · Super Jump</title>
  <style>
    body{margin:0;background:#08080f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
    .ld{text-align:center;color:#a855f7}
    .ld .ring{width:48px;height:48px;border:3px solid rgba(168,85,247,.15);border-top-color:#a855f7;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 18px}
    .ld p{color:#7070a0;font-size:14px;margin-top:6px}
    .err{color:#ef4444;font-size:14px;max-width:360px;text-align:center}
    .err a{color:#a855f7}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="ld" id="loader">
    <div class="ring"></div>
    Загрузка сайта…
    <p>Применяю правки автоматически</p>
  </div>

<script>
(async () => {
  const BASE = 'https://dom2411edinstvo.github.io/sj_savitskaya/';
  const GIST = '7e4fea0b9061dd24027c8419bc05048a';

  try {
    /* ── 1. Загружаем gist ────────────────────────────── */
    let src;
    const cached = sessionStorage.getItem('sj_src');
    if (cached) {
      src = cached;
    } else {
      const r = await fetch('https://api.github.com/gists/' + GIST);
      if (!r.ok) throw new Error('GitHub API: ' + r.status);
      const g = await r.json();
      src = g.files[Object.keys(g.files)[0]].content;
      try { sessionStorage.setItem('sj_src', src); } catch(e) {}
    }

    /* ── 2. Абсолютные пути к картинкам ───────────────── */
    if (location.hostname !== 'dom2411edinstvo.github.io') {
      src = src.replace(/src="img\//g,  'src="' + BASE + 'img/');
      src = src.replace(/url\(['"]?img\//g, "url('" + BASE + "img/");
    }

    /* ── 3. CSS-правки → перед </style> ───────────────── */
    const cssInject = `

    /* ====== ПРАВКА 1: плашки hero ×3 меньше на мобильных ====== */
    @media (max-width: 768px) {
      .hero-shrink-badge {
        transform: scale(0.33) !important;
        transform-origin: center !important;
        margin: 0 !important;
      }
    }

    /* ====== ПРАВКА 2: desc.jpg — превью + fullscreen ====== */
    .desc-sec { padding: 48px 0 24px; }
    .desc-card {
      position: relative;
      max-width: 640px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform .3s, box-shadow .3s;
    }
    .desc-card:hover {
      transform: scale(1.012);
      box-shadow: 0 8px 36px rgba(168,85,247,.22);
    }
    .desc-card img { width: 100%; display: block; }
    .desc-card-hint {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px;
      background: linear-gradient(transparent, rgba(0,0,0,.65));
      text-align: center; color: #fff;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .3s;
    }
    .desc-card:hover .desc-card-hint { opacity: 1; }

    .desc-lb {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.96);
      justify-content: center; align-items: center;
      padding: 12px; cursor: zoom-out;
    }
    .desc-lb.open { display: flex; }
    .desc-lb-x {
      position: fixed; top: 10px; right: 16px;
      font-size: 40px; color: #fff; cursor: pointer;
      z-index: 10001; line-height: 1; opacity: .7;
      transition: opacity .2s;
    }
    .desc-lb-x:hover { opacity: 1; }
    .desc-lb img {
      max-width: 96vw; max-height: 93vh;
      object-fit: contain; border-radius: 8px; display: block;
    }
    .desc-err {
      max-width: 340px; text-align: center; color: #7070a0;
      font-size: 13px; padding: 40px 20px;
      border: 1px dashed rgba(255,255,255,.12); border-radius: 16px;
      margin: 0 auto;
    }
    .desc-err span { font-size: 32px; display: block; margin-bottom: 10px; }

    @media (max-width: 768px) {
      .desc-card-hint { opacity: 1; font-size: 11px; padding: 10px; }
      .desc-lb img { max-width: 100vw; max-height: 95vh; }
    }
    `;
    src = src.replace('</style>', cssInject + '\n</style>');

    /* ── 4. HTML desc.jpg → после первого <hr> ────────── */
    const imgBase = (location.hostname === 'dom2411edinstvo.github.io') ? '' : BASE;
    const descBlock = `
    <!-- ===== DESC.JPG ===== -->
    <section class="desc-sec" id="desc">
      <div class="con">
        <div class="desc-card" id="descCard">
          <img src="${imgBase}img/desc.jpg" alt="Описание программы"
               onerror="this.parentElement.innerHTML='<div class=desc-err><span>📄</span>Файл img/desc.jpg ещё не загружен.<br>Добавьте его в папку img/ на GitHub.</div>'">
          <div class="desc-card-hint">🔍 Нажмите, чтобы увеличить</div>
        </div>
      </div>
    </section>
    <div class="desc-lb" id="descLb">
      <span class="desc-lb-x" id="descX">&times;</span>
      <img src="${imgBase}img/desc.jpg" alt="Описание программы">
    </div>
    `;
    const hrPos = src.indexOf('<hr');
    if (hrPos > -1) {
      const hrEnd = src.indexOf('>', hrPos) + 1;
      src = src.slice(0, hrEnd) + descBlock + src.slice(hrEnd);
    }

    /* ── 5. JS-правки → перед </body> ─────────────────── */
    const jsInject = `
    <` + `script>
    /* ====== Находим и уменьшаем плашки ====== */
    (function(){
      var img = document.querySelector('#home img[src*="1.jpg"]');
      if (!img) return;
      // Поднимаемся от img, ищем контейнер, у которого есть сиблинг с "Онлайн-формат"
      var el = img;
      for (var u = 0; u < 6; u++) {
        el = el.parentElement;
        if (!el || el.id === 'home') return;
        var par = el.parentElement;
        if (!par) continue;
        var found = false;
        for (var s = 0; s < par.children.length; s++) {
          if (par.children[s] !== el &&
              par.children[s].textContent.indexOf('Онлайн-формат') > -1) {
            found = true; break;
          }
        }
        if (found) {
          for (var c = 0; c < par.children.length; c++) {
            var ch = par.children[c];
            if (!ch.querySelector('img[src*="1.jpg"]')) {
              ch.classList.add('hero-shrink-badge');
            }
          }
          break;
        }
      }
    })();

    /* ====== DESC.JPG lightbox ====== */
    (function(){
      var card = document.getElementById('descCard');
      var lb   = document.getElementById('descLb');
      var x    = document.getElementById('descX');
      if (!card || !lb) return;
      function open()  { lb.classList.add('open');    document.body.style.overflow = 'hidden'; }
      function close() { lb.classList.remove('open'); document.body.style.overflow = ''; }
      card.addEventListener('click', open);
      x.addEventListener('click', function(e){ e.stopPropagation(); close(); });
      lb.addEventListener('click', close);
      document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
    })();
    <` + `/script>
    `;
    src = src.replace('</body>', jsInject + '\n</body>');

    /* ── 6. Отрисовка ─────────────────────────────────── */
    document.open();
    document.write(src);
    document.close();

  } catch(e) {
    document.getElementById('loader').innerHTML =
      '<div class="err">❌ Не удалось загрузить сайт<br><br>' +
      e.message + '<br><br>' +
      '<a href="' + BASE + '">Открыть оригинал →</a></div>';
  }
})();
</script>
</body>
</html>
